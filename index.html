<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather App ⛅</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <section class="hero">
      <div class="weather-card">
        <h1 class="title">🌦️ Weather App</h1>

        <div class="search-box">
          <input type="text" id="cityInput" placeholder="Enter City Name" />
          <button onclick="getWeather()">Search</button>
        </div>

        <div id="weatherData" class="weather-info">
          <h2 id="cityName"></h2>

          <p>🌡 Temperature: <span id="temp"></span></p>

          <p>💧 Humidity: <span id="humidity"></span></p>

          <p>💨 Wind Speed: <span id="windSpeed"></span></p>

          <p>🧭 Wind Direction: <span id="windDir"></span></p>

          <p>🌫 Pressure: <span id="pressure"></span></p>

          <p>🌧 Precipitation: <span id="precipitation"></span></p>
        </div>
      </div>
    </section>

    <script src="script.js"></script>
  </body>
</html>
